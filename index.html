<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HK Mahjong (be) foreplay</title>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700;900&family=Orbitron:wght@500;700;900&display=swap');
    
    body {
      background-color: #000000 !important;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(255, 0, 128, 0.08), transparent 30%),
        radial-gradient(circle at 85% 30%, rgba(0, 231, 255, 0.08), transparent 30%);
      color: white;
      font-family: 'Noto Sans HK', sans-serif;
      overflow-x: hidden;
      margin: 0;
    }
    
    .font-display { font-family: 'Orbitron', 'Noto Sans HK', sans-serif; }

    /* Neon Text Glows */
    .neon-text-pink { text-shadow: 0 0 5px #ff00a0, 0 0 10px #ff00a0, 0 0 20px #ff00a0; color: #fff; }
    .neon-text-blue { text-shadow: 0 0 5px #00e7ff, 0 0 10px #00e7ff, 0 0 20px #00e7ff; color: #fff; }
    .neon-text-green { text-shadow: 0 0 5px #39ff14, 0 0 10px #39ff14, 0 0 20px #39ff14; color: #fff; }
    .neon-text-yellow { text-shadow: 0 0 5px #ffea00, 0 0 10px #ffea00, 0 0 20px #ffea00; color: #fff; }
    .neon-text-red { text-shadow: 0 0 5px #ff003c, 0 0 10px #ff003c, 0 0 20px #ff003c; color: #fff; }
    .neon-text-purple { text-shadow: 0 0 5px #bc13fe, 0 0 10px #bc13fe, 0 0 20px #bc13fe; color: #fff; }

    /* Neon Boxes */
    .neon-box-pink { border: 2px solid #ff00a0; box-shadow: 0 0 5px #ff00a0, inset 0 0 5px #ff00a0; background: rgba(255, 0, 160, 0.03); backdrop-filter: blur(8px); }
    .neon-box-blue { border: 2px solid #00e7ff; box-shadow: 0 0 5px #00e7ff, inset 0 0 5px #00e7ff; background: rgba(0, 231, 255, 0.03); backdrop-filter: blur(8px); }
    .neon-box-green { border: 2px solid #39ff14; box-shadow: 0 0 5px #39ff14, inset 0 0 5px #39ff14; background: rgba(57, 255, 20, 0.03); backdrop-filter: blur(8px); }
    .neon-box-yellow { border: 2px solid #ffea00; box-shadow: 0 0 5px #ffea00, inset 0 0 5px #ffea00; background: rgba(255, 234, 0, 0.03); backdrop-filter: blur(8px); }

    /* Tile Colors */
    .text-suit-red { color: #ef4444 !important; }
    .text-suit-green { color: #22c55e !important; }
    .text-suit-blue { color: #3b82f6 !important; }
    .text-suit-black { color: #333333 !important; }
    .text-suit-yellow { color: #eab308 !important; }

    /* Tile specific */
    .mahjong-tile { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-shadow: none; }
    .tile-card {
      background: linear-gradient(145deg, #ffffff, #e6e6e6);
      border-radius: 8px;
      border-bottom: 6px solid #166534;
      border-right: 4px solid #cbd5e1;
      box-shadow: 2px 4px 10px rgba(0,0,0,0.8);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
      cursor: pointer;
    }
    .tile-card:hover { transform: scale(1.15) translateY(-5px); box-shadow: 0 10px 25px rgba(0, 231, 255, 0.4); z-index: 10; }

    /* Animations */
    @keyframes flicker { 0%, 18%, 22%, 25%, 53%, 57%, 100% { text-shadow: 0 0 5px #ff00a0, 0 0 10px #ff00a0, 0 0 20px #ff00a0; opacity: 1; } 20%, 24%, 55% { text-shadow: none; opacity: 0.8; } }
    .flicker { animation: flicker 4s infinite alternate; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-bounce-slow { animation: bounce 2s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUITS = [
      { name: 'Characters (萬 - Maan)', tiles: ['🀇','🀈','🀉','🀊','🀋','🀌','🀍','🀎','🀏'], color: 'text-red-500', glow: 'neon-text-red', tileColor: 'text-suit-red' },
      { name: 'Bamboo (索 - Sok)', tiles: ['🀐','🀑','🀒','🀓','🀔','🀕','🀖','🀗','🀘'], color: 'text-green-500', glow: 'neon-text-green', tileColor: 'text-suit-green' },
      { name: 'Dots (筒 - Tung)', tiles: ['🀙','🀚','🀛','🀜','🀝','🀞','🀟','🀠','🀡'], color: 'text-blue-400', glow: 'neon-text-blue', tileColor: 'text-suit-blue' }
    ];

    const HONORS = [
      { name: 'Winds (風 - Fung)', labels: ['East (東)', 'South (南)', 'West (西)', 'North (北)'], tiles: ['🀀','🀁','🀂','🀃'], color: 'text-yellow-400', glow: 'neon-text-yellow', tileColors: ['text-suit-black', 'text-suit-black', 'text-suit-black', 'text-suit-black'] },
      { name: 'Dragons (番)', labels: ['Red (中)', 'Green (發)', 'White (白)'], tiles: ['🀄','🀅','🀆'], color: 'text-purple-400', glow: 'neon-text-purple', tileColors: ['text-suit-red', 'text-suit-green', 'text-suit-blue'] }
    ];

    const BONUS = [
      { name: 'Flowers (花)', labels: ['1. Plum', '2. Orchid', '3. Chrys.', '4. Bamboo'], tiles: ['🀢','🀣','🀤','🀥'], glow: 'neon-text-pink', tileColors: ['text-suit-red', 'text-suit-blue', 'text-suit-yellow', 'text-suit-green'] },
      { name: 'Seasons (季)', labels: ['1. Spring', '2. Summer', '3. Autumn', '4. Winter'], tiles: ['🀦','🀧','🀨','🀩'], glow: 'neon-text-green', tileColors: ['text-suit-green', 'text-suit-red', 'text-suit-yellow', 'text-suit-blue'] }
    ];

    // Expanded Practice Hands Bank
    const ALL_PRACTICE_HANDS = [
      {
        title: "The Sequence Wait (嵌張)",
        desc: "You have a 1 and a 3. You need the middle tile to complete your 4th Soeng (sequence). What is it?",
        hand: [{ t:'🀙', c:'text-suit-blue' }, { t:'🀙', c:'text-suit-blue' }, { t:'🀙', c:'text-suit-blue' }, { t:'🀐', c:'text-suit-green' }, { t:'🀑', c:'text-suit-green' }, { t:'🀒', c:'text-suit-green' }, { t:'🀄', c:'text-suit-red' }, { t:'🀄', c:'text-suit-red' }, { t:'🀄', c:'text-suit-red' }, { t:'🀀', c:'text-suit-black' }, { t:'🀀', c:'text-suit-black' }, { t:'🀇', c:'text-suit-red' }, { t:'🀉', c:'text-suit-red' }],
        options: [{ t:'🀆', c:'text-suit-blue' }, { t:'🀈', c:'text-suit-red' }, { t:'🀊', c:'text-suit-red' }, { t:'🀀', c:'text-suit-black' }],
        answerIdx: 1, explanation: "You have a 1-Maan and 3-Maan. You need a 2-Maan (🀈) to complete the Soeng (1-2-3)!"
      },
      {
        title: "The Eye Wait (單吊)",
        desc: "You have 4 complete sets, but your Eye (Pair) is incomplete. What tile do you need?",
        hand: [{ t:'🀐', c:'text-suit-green' }, { t:'🀐', c:'text-suit-green' }, { t:'🀐', c:'text-suit-green' }, { t:'🀙', c:'text-suit-blue' }, { t:'🀚', c:'text-suit-blue' }, { t:'🀛', c:'text-suit-blue' }, { t:'🀜', c:'text-suit-blue' }, { t:'🀝', c:'text-suit-blue' }, { t:'🀞', c:'text-suit-blue' }, { t:'🀇', c:'text-suit-red' }, { t:'🀈', c:'text-suit-red' }, { t:'🀉', c:'text-suit-red' }, { t:'🀅', c:'text-suit-green' }],
        options: [{ t:'🀐', c:'text-suit-green' }, { t:'🀙', c:'text-suit-blue' }, { t:'🀅', c:'text-suit-green' }, { t:'🀄', c:'text-suit-red' }],
        answerIdx: 2, explanation: "You need a second Green Dragon (🀅) to complete your pair (The Eye)!"
      },
      {
        title: "The Two-Sided Wait (兩面聽)",
        desc: "You have a sequence of 2 and 3. You can win with either a 1 or a 4! Which tile completes this?",
        hand: [{ t:'🀙', c:'text-suit-blue' }, { t:'🀙', c:'text-suit-blue' }, { t:'🀙', c:'text-suit-blue' }, { t:'🀐', c:'text-suit-green' }, { t:'🀐', c:'text-suit-green' }, { t:'🀐', c:'text-suit-green' }, { t:'🀄', c:'text-suit-red' }, { t:'🀄', c:'text-suit-red' }, { t:'🀄', c:'text-suit-red' }, { t:'🀀', c:'text-suit-black' }, { t:'🀀', c:'text-suit-black' }, { t:'🀑', c:'text-suit-green' }, { t:'🀒', c:'text-suit-green' }],
        options: [{ t:'🀆', c:'text-suit-blue' }, { t:'🀐', c:'text-suit-green' }, { t:'🀕', c:'text-suit-green' }, { t:'🀀', c:'text-suit-black' }],
        answerIdx: 1, explanation: "With a 2 and 3 of Bamboo, you need a 1 or a 4. The 1 of Bamboo (🀐) perfectly completes your sequence!"
      },
      {
        title: "The Pong Wait (對碰)",
        desc: "You are waiting to complete your final Pong. You have a pair of 8-Dots. What do you need?",
        hand: [{ t:'🀐', c:'text-suit-green' }, { t:'🀑', c:'text-suit-green' }, { t:'🀒', c:'text-suit-green' }, { t:'🀇', c:'text-suit-red' }, { t:'🀈', c:'text-suit-red' }, { t:'🀉', c:'text-suit-red' }, { t:'🀄', c:'text-suit-red' }, { t:'🀄', c:'text-suit-red' }, { t:'🀄', c:'text-suit-red' }, { t:'🀀', c:'text-suit-black' }, { t:'🀀', c:'text-suit-black' }, { t:'🀠', c:'text-suit-blue' }, { t:'🀠', c:'text-suit-blue' }],
        options: [{ t:'🀠', c:'text-suit-blue' }, { t:'🀡', c:'text-suit-blue' }, { t:'🀀', c:'text-suit-black' }, { t:'🀟', c:'text-suit-blue' }],
        answerIdx: 0, explanation: "You need a third 8-Dots (🀠) to complete the Pong!"
      },
      {
        title: "The Terminal Wait (邊張)",
        desc: "You have an 8 and 9 of Characters. A sequence cannot go past 9! What is the ONLY tile that saves you?",
        hand: [{ t:'🀙', c:'text-suit-blue' }, { t:'🀙', c:'text-suit-blue' }, { t:'🀙', c:'text-suit-blue' }, { t:'🀐', c:'text-suit-green' }, { t:'🀑', c:'text-suit-green' }, { t:'🀒', c:'text-suit-green' }, { t:'🀄', c:'text-suit-red' }, { t:'🀄', c:'text-suit-red' }, { t:'🀄', c:'text-suit-red' }, { t:'🀀', c:'text-suit-black' }, { t:'🀀', c:'text-suit-black' }, { t:'🀎', c:'text-suit-red' }, { t:'🀏', c:'text-suit-red' }],
        options: [{ t:'🀊', c:'text-suit-red' }, { t:'🀍', c:'text-suit-red' }, { t:'🀀', c:'text-suit-black' }, { t:'🀆', c:'text-suit-blue' }],
        answerIdx: 1, explanation: "With an 8 and 9, you are forced to wait for a 7 (🀍) to make the 7-8-9 sequence!"
      },
      {
        title: "The Great Scholars Wait",
        desc: "You are building the legendary Three Great Scholars hand! You have the Red and White dragons... what completes the trio?",
        hand: [{ t:'🀄', c:'text-suit-red' }, { t:'🀄', c:'text-suit-red' }, { t:'🀄', c:'text-suit-red' }, { t:'🀆', c:'text-suit-blue' }, { t:'🀆', c:'text-suit-blue' }, { t:'🀆', c:'text-suit-blue' }, { t:'🀐', c:'text-suit-green' }, { t:'🀑', c:'text-suit-green' }, { t:'🀒', c:'text-suit-green' }, { t:'🀀', c:'text-suit-black' }, { t:'🀀', c:'text-suit-black' }, { t:'🀅', c:'text-suit-green' }, { t:'🀅', c:'text-suit-green' }],
        options: [{ t:'🀄', c:'text-suit-red' }, { t:'🀆', c:'text-suit-blue' }, { t:'🀅', c:'text-suit-green' }, { t:'🀁', c:'text-suit-black' }],
        answerIdx: 2, explanation: "You need the Green Dragon (🀅) to complete the legendary Three Great Scholars (64 Fan)!"
      }
    ];

    // Expanded Quiz Bank
    const ALL_QUIZ_QUESTIONS = [
      { question: "How many tiles do you normally need to complete a winning hand?", options: ["13", "14", "16", "21"], answer: 1, explanation: "A standard winning hand consists of 14 tiles (4 melds + 1 pair)." },
      { question: "Which of these tiles is the 'Red Dragon' (Hung Chung)?", options: ["🀆", "🀀", "🀄", "🀅"], answer: 2, explanation: "🀄 is the Red Dragon." },
      { question: "What is a 'Pong' (碰)?", options: ["A sequence of 3 consecutive tiles", "A pair of identical tiles", "4 of a kind", "3 identical tiles"], answer: 3, explanation: "A Pong is a set of 3 identical tiles." },
      { question: "What makes up a 'Soeng' (上/Chow)?", options: ["3 consecutive tiles of the SAME suit", "3 identical tiles", "Any 3 Wind tiles", "2 identical tiles"], answer: 0, explanation: "A Soeng is a sequence of 3 consecutive tiles from the same suit." },
      { question: "From whom can you claim a discarded tile to make a 'Soeng' (Chow)?", options: ["Any player", "The player opposite you", "The player to your immediate LEFT", "The player to your right"], answer: 2, explanation: "You can ONLY Chow a tile discarded by the player sitting immediately to your left!" },
      { question: "If two players want the exact same discarded tile, who gets it?", options: ["The one who wants to Win", "The one who wants to Pong", "The one who wants to Chow", "The one who shouts first"], answer: 0, explanation: "Claim Priority: Winning beats everything. Pong/Kong beats Chow." },
      { question: "If you draw your own winning tile from the wall, it is called:", options: ["Discard Win", "Self-Drawn (自摸 - Zimo)", "Stolen Win", "Lucky Draw"], answer: 1, explanation: "Drawing it yourself is Zimo! Everyone at the table must pay you, rather than just the person who discarded it." },
      { question: "How many Fan is a 'Full Flush' (清一色) worth?", options: ["3 Fan", "5 Fan", "7 Fan", "13 Fan"], answer: 2, explanation: "A Full Flush (entirely one suit) is highly valuable and worth 7 Fan!" },
      { question: "How many Fan is the legendary 'Thirteen Orphans' (十三幺) worth?", options: ["3 Fan", "7 Fan", "13 Fan", "64 Fan (Max Limit)"], answer: 3, explanation: "Thirteen Orphans is one of the hardest hands to achieve and triggers the maximum limit payout (64 Fan)!" },
      { question: "What constitutes the 'All Honors' (字一色) hand?", options: ["Only Characters", "Only Winds and Dragons", "Only 1s and 9s", "Only Green and Red tiles"], answer: 1, explanation: "All Honors is made entirely of Wind and Dragon tiles." },
      { question: "What are the bonus tiles that are immediately replaced when drawn?", options: ["Gold and Silver", "Flowers and Seasons", "Emperors and Scholars", "Suns and Moons"], answer: 1, explanation: "Flowers and Seasons are immediately exposed, give bonus points, and you draw a replacement tile." },
      { question: "Which tiles make up the 'Three Great Scholars' (大三元)?", options: ["Plum, Orchid, Bamboo, Chrysanthemum", "1, 2, and 3 of Dots", "East, South, West Winds", "Red, Green, and White Dragons"], answer: 3, explanation: "The Three Great Scholars require Pongs or Kongs of the Red, Green, and White Dragons." }
    ];

    const shuffleArray = (array) => [...array].sort(() => 0.5 - Math.random());

    function App() {
      const [screen, setScreen] = useState('home'); 
      
      const [activePracticeHands, setActivePracticeHands] = useState([]);
      const [practiceIndex, setPracticeIndex] = useState(0);
      const [practiceAnswers, setPracticeAnswers] = useState({});

      const [activeQuizQuestions, setActiveQuizQuestions] = useState([]);
      const [quizIndex, setQuizIndex] = useState(0);
      const [quizAnswers, setQuizAnswers] = useState({});

      const startTutorial = () => {
        setScreen('learn_tiles');
      };

      const startPractice = () => {
        setActivePracticeHands(shuffleArray(ALL_PRACTICE_HANDS).slice(0, 5));
        setPracticeAnswers({});
        setPracticeIndex(0);
        setScreen('practice_wait');
      };

      const startQuiz = () => {
        setActiveQuizQuestions(shuffleArray(ALL_QUIZ_QUESTIONS).slice(0, 5));
        setQuizAnswers({});
        setQuizIndex(0);
        setScreen('quiz');
      };

      const handlePracticeAnswer = (idx) => {
        if (practiceAnswers[practiceIndex] !== undefined) return;
        setPracticeAnswers({...practiceAnswers, [practiceIndex]: idx});
      };

      const handleQuizAnswer = (idx) => {
        if (quizAnswers[quizIndex] !== undefined) return;
        setQuizAnswers({...quizAnswers, [quizIndex]: idx});
      };

      const renderHome = () => (
        <div className="flex flex-col items-center justify-center min-h-screen p-6 text-center">
          <div className="mb-6 flex gap-4">
            <span className="text-7xl mahjong-tile text-suit-red drop-shadow-[0_0_15px_#fff] tile-card px-2 pb-1 bg-white rounded-xl">🀄</span>
            <span className="text-7xl mahjong-tile text-suit-green drop-shadow-[0_0_15px_#fff] tile-card px-2 pb-1 bg-white rounded-xl">🀅</span>
            <span className="text-7xl mahjong-tile text-suit-blue drop-shadow-[0_0_15px_#fff] tile-card px-2 pb-1 bg-white rounded-xl">🀆</span>
          </div>
          <h1 className="text-4xl md:text-7xl font-display font-black mb-4 neon-text-pink flicker tracking-wider uppercase">
            HK Mahjong (be) foreplay
          </h1>
          <h2 className="text-3xl md:text-5xl font-display neon-text-blue mb-12">
            香港麻雀速成班
          </h2>
          <p className="max-w-xl text-gray-300 text-2xl mb-12 leading-relaxed">
            Welcome to the neon-lit streets of Hong Kong Mahjong. Learn the tiles, build winning sets, and test your skills to become a master!
          </p>
          <button onClick={startTutorial} className="text-white px-10 py-5 text-2xl font-bold font-display rounded-full neon-box-pink hover:bg-pink-600 transition-all duration-300 transform hover:scale-105">
            START TUTORIAL
          </button>
        </div>
      );

      const renderLearnTiles = () => (
        <div className="flex flex-col min-h-screen p-6 max-w-5xl mx-auto pb-32">
          <h2 className="text-5xl font-display font-bold neon-text-blue text-center my-10 border-b border-cyan-500 pb-6">
            1. THE TILES (牌)
          </h2>
          <p className="text-center text-gray-300 mb-10 text-2xl">
            Hover over the tiles! There are 3 main suits (1-9), Honors, and Bonus tiles.
          </p>

          <div className="space-y-12">
            {/* Suits */}
            <div className="p-8 rounded-xl neon-box-blue">
                <h3 className="text-3xl font-bold mb-6 neon-text-red">Characters (萬 - Maan)</h3>
                <p className="hidden">Please put this in box 1.</p>
                <div className="flex flex-wrap gap-3">
                  {SUITS[0].tiles.map((tile, i) => (
                    <div key={i} className={`tile-card flex items-center justify-center w-16 h-24 md:w-20 md:h-28 text-5xl md:text-6xl mahjong-tile ${SUITS[0].tileColor}`}>
                      {tile}
                    </div>
                  ))}
                </div>
            </div>

            {SUITS.slice(1).map((suit, idx) => (
              <div key={idx} className="p-8 rounded-xl neon-box-blue">
                <h3 className={`text-3xl font-bold mb-6 ${suit.glow}`}>{suit.name}</h3>
                <div className="flex flex-wrap gap-3">
                  {suit.tiles.map((tile, i) => (
                    <div key={i} className={`tile-card flex items-center justify-center w-16 h-24 md:w-20 md:h-28 text-5xl md:text-6xl mahjong-tile ${suit.tileColor}`}>
                      {tile}
                    </div>
                  ))}
                </div>
              </div>
            ))}

            {/* Honors */}
            <div className="p-8 rounded-xl neon-box-pink">
              <h3 className="text-3xl font-bold mb-6 neon-text-pink">Honors (Winds & Dragons)</h3>
              {HONORS.map((honor, idx) => (
                <div key={idx} className="mb-8 last:mb-0">
                  <h4 className={`text-2xl font-bold mb-4 ${honor.glow}`}>{honor.name}</h4>
                  <div className="flex flex-wrap gap-6">
                    {honor.tiles.map((tile, i) => (
                      <div key={i} className="flex flex-col items-center">
                        <div className={`tile-card flex items-center justify-center w-16 h-24 md:w-20 md:h-28 text-5xl md:text-6xl mahjong-tile mb-3 ${honor.tileColors[i]}`}>
                          {tile}
                        </div>
                        <span className="text-lg text-gray-300 font-bold">{honor.labels[i]}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>

            {/* Bonus */}
            <div className="p-8 rounded-xl neon-box-green">
              <h3 className="text-3xl font-bold mb-4 neon-text-green">Bonus Tiles (Flowers & Seasons)</h3>
              <p className="text-xl text-gray-300 mb-6">When drawn, you immediately place these face up in front of you and draw a replacement tile from the back of the wall. <span className="text-green-400 font-bold">They do not count towards your 14 winning tiles.</span></p>
              {BONUS.map((bgroup, idx) => (
                <div key={idx} className="mb-8 last:mb-0">
                  <h4 className={`text-2xl font-bold mb-4 ${bgroup.glow}`}>{bgroup.name}</h4>
                  <div className="flex flex-wrap gap-6">
                    {bgroup.tiles.map((tile, i) => (
                      <div key={i} className="flex flex-col items-center">
                        <div className={`tile-card flex items-center justify-center w-16 h-24 md:w-20 md:h-28 text-5xl md:text-6xl mahjong-tile mb-3 ${bgroup.tileColors[i]}`}>
                          {tile}
                        </div>
                        <span className="text-lg text-gray-300 font-bold">{bgroup.labels[i]}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>

          </div>
          <div className="fixed bottom-0 left-0 w-full p-6 bg-black bg-opacity-95 border-t border-gray-800 flex justify-between items-center z-20">
            <button onClick={() => setScreen('home')} className="text-gray-400 hover:text-white px-6 py-3 text-xl font-bold">Back to Home</button>
            <button onClick={() => setScreen('learn_setup')} className="text-white px-8 py-4 text-xl font-bold rounded-lg neon-box-blue hover:bg-cyan-600 transition-colors">
              NEXT: GAME SETUP ➔
            </button>
          </div>
        </div>
      );

      const renderLearnSetup = () => (
        <div className="flex flex-col min-h-screen p-6 max-w-5xl mx-auto pb-32">
          <h2 className="text-5xl font-display font-bold neon-text-yellow text-center my-10 border-b border-yellow-500 pb-6 flicker">
            2. GAME SETUP (開局)
          </h2>
          <p className="text-center text-gray-300 mb-10 text-2xl leading-relaxed">
            Before the tiles start flying, you have to build the board!
          </p>

          <div className="space-y-8 mb-12">
            
            <div className="neon-box-blue p-8 rounded-xl">

                    } else {
                        if (idx === game.answerIdx) {
                            btnStyle += "border-4 border-green-500 shadow-[0_0_25px_#39ff14] transform scale-110";
                        } else if (idx === selectedAns) {
                            btnStyle += "border-4 border-red-500 opacity-50 bg-gray-800";
                        } else {
                            btnStyle += "opacity-50";
                        }
                    }
                    return (
                        <button key={idx} onClick={() => handlePracticeAnswer(idx)} disabled={hasAnswered} className={`${btnStyle} ${opt.c}`}>
                            {opt.t}
                        </button>
                    )
                 })}
              </div>
            </div>

            {hasAnswered && (
              <div className="w-full animate-[fadeIn_0.5s_ease-in-out]">
                <div className={`p-6 rounded-xl border-2 ${isCorrect ? 'border-green-500 bg-green-900 bg-opacity-30' : 'border-red-500 bg-red-900 bg-opacity-30'}`}>
                  <h3 className={`text-3xl font-bold mb-3 ${isCorrect ? 'neon-text-green' : 'neon-text-red'}`}>
                    {isCorrect ? 'CORRECT! 答啱！' : 'NOT QUITE! 錯!'}
                  </h3>
                  <p className="text-xl text-gray-200 leading-relaxed">{game.explanation}</p>
                </div>
              </div>
            )}

            <div className="fixed bottom-0 left-0 w-full p-6 bg-black bg-opacity-95 border-t border-gray-800 flex justify-between items-center z-20">
              <button 
                onClick={() => setPracticeIndex(practiceIndex - 1)} 
                disabled={practiceIndex === 0}
                className={`px-8 py-4 text-xl font-bold rounded-lg transition-colors ${practiceIndex === 0 ? 'bg-gray-900 text-gray-700 cursor-not-allowed' : 'border border-gray-500 text-white hover:bg-gray-800'}`}
              >
                ⬅ PREVIOUS
              </button>
              
              <button 
                onClick={() => {
                  if (practiceIndex + 1 === activePracticeHands.length) {
                    startQuiz();
                  } else {
                    setPracticeIndex(practiceIndex + 1);
                  }
                }}
                disabled={!hasAnswered}
                className={`px-8 py-4 text-xl font-bold rounded-lg transition-colors ${!hasAnswered ? 'bg-gray-900 text-gray-700 cursor-not-allowed' : 'neon-box-pink hover:bg-pink-600 text-white'}`}
              >
                {practiceIndex + 1 === activePracticeHands.length ? 'START FINAL QUIZ ➔' : 'NEXT HAND ➔'}
              </button>
            </div>
          </div>
        );
      };

      const renderQuiz = () => {
        if (activeQuizQuestions.length === 0) return null;
        const q = activeQuizQuestions[quizIndex];
        const hasAnswered = quizAnswers[quizIndex] !== undefined;
        const selectedAns = quizAnswers[quizIndex];

        return (
          <div className="flex flex-col items-center justify-center min-h-screen p-6 max-w-4xl mx-auto w-full pb-40">
            <div className="w-full flex justify-between items-center mb-10">
              <span className="text-gray-400 font-display text-xl">QUESTION {quizIndex + 1}/{activeQuizQuestions.length}</span>
              <span className="neon-text-blue font-bold font-display text-2xl">FINAL EXAM</span>
            </div>

            <div className="w-full neon-box-blue p-10 rounded-2xl mb-10 shadow-[0_0_30px_rgba(0,231,255,0.1)]">
              <h2 className="text-3xl md:text-4xl font-bold mb-10 text-white leading-tight">
                {q.question}
              </h2>

              <div className="flex flex-col gap-6">
                {q.options.map((opt, idx) => {
                  let btnClass = "text-white w-full text-left p-6 rounded-xl border-2 transition-all duration-300 text-2xl ";
                  if (!hasAnswered) {
                    btnClass += "border-gray-700 bg-gray-800 hover:border-cyan-400 hover:shadow-[0_0_15px_#00e7ff] hover:scale-[1.02]";
                  } else {
                    if (idx === q.answer) {
                      btnClass += "border-green-500 bg-green-900 bg-opacity-50 neon-text-green shadow-[0_0_15px_#39ff14]";
                    } else if (idx === selectedAns) {
                      btnClass += "border-red-500 bg-red-900 bg-opacity-50 text-red-300 shadow-[0_0_15px_#ff003c]";
                    } else {
                      btnClass += "border-gray-700 bg-gray-900 opacity-50";
                    }
                  }
                  
                  const getColoredText = (text) => {
                    if(text.includes('🀆')) return <span className="text-6xl mahjong-tile text-suit-blue bg-white p-2 rounded-lg text-black">{text}</span>;
                    if(text.includes('🀀')) return <span className="text-6xl mahjong-tile text-suit-black bg-white p-2 rounded-lg">{text}</span>;
                    if(text.includes('🀄')) return <span className="text-6xl mahjong-tile text-suit-red bg-white p-2 rounded-lg">{text}</span>;
                    if(text.includes('🀅')) return <span className="text-6xl mahjong-tile text-suit-green bg-white p-2 rounded-lg">{text}</span>;
                    return text;
                  };

                  return (
                    <button key={idx} onClick={() => handleQuizAnswer(idx)} disabled={hasAnswered} className={btnClass}>
                      {getColoredText(opt)}
                    </button>
                  );
                })}
              </div>
            </div>

            {hasAnswered && (
              <div className="w-full animate-[fadeIn_0.5s_ease-in-out]">
                <div className={`p-6 rounded-xl mb-8 border-2 ${selectedAns === q.answer ? 'border-green-500 bg-green-900 bg-opacity-30' : 'border-red-500 bg-red-900 bg-opacity-30'}`}>
                  <h3 className={`text-3xl font-bold mb-3 ${selectedAns === q.answer ? 'neon-text-green' : 'neon-text-red'}`}>
                    {selectedAns === q.answer ? 'CORRECT! 答啱！' : 'INCORRECT! 錯!'}
                  </h3>
                  <p className="text-xl text-gray-200 leading-relaxed">{q.explanation}</p>
                </div>
              </div>
            )}

            <div className="fixed bottom-0 left-0 w-full p-6 bg-black bg-opacity-95 border-t border-gray-800 flex justify-between items-center z-20">
              <button 
                onClick={() => setQuizIndex(quizIndex - 1)} 
                disabled={quizIndex === 0}
                className={`px-8 py-4 text-xl font-bold rounded-lg transition-colors ${quizIndex === 0 ? 'bg-gray-900 text-gray-700 cursor-not-allowed' : 'border border-gray-500 text-white hover:bg-gray-800'}`}
              >
                ⬅ PREVIOUS
              </button>
              
              <button 
                onClick={() => {
                  if (quizIndex + 1 === activeQuizQuestions.length) {
                    setScreen('result');
                  } else {
                    setQuizIndex(quizIndex + 1);
                  }
                }}
                disabled={!hasAnswered}
                className={`px-8 py-4 text-xl font-bold rounded-lg transition-colors ${!hasAnswered ? 'bg-gray-900 text-gray-700 cursor-not-allowed' : 'neon-box-blue hover:bg-cyan-600 text-white'}`}
              >
                {quizIndex + 1 === activeQuizQuestions.length ? 'SEE RESULTS ➔' : 'NEXT QUESTION ➔'}
              </button>
            </div>
          </div>
        );
      };

      const renderResult = () => {
        const score = Object.keys(quizAnswers).reduce((acc, qIdx) => {
          return acc + (quizAnswers[qIdx] === activeQuizQuestions[qIdx].answer ? 1 : 0);
        }, 0);

        const isPerfect = score === activeQuizQuestions.length;
        const isGood = score >= activeQuizQuestions.length / 2;
        
        return (
          <div className="flex flex-col items-center justify-center min-h-screen p-6 text-center">
            <h1 className="text-6xl md:text-8xl font-display font-black mb-8 neon-text-pink flicker">QUIZ COMPLETE</h1>
            <div className="w-56 h-56 rounded-full neon-box-blue flex items-center justify-center flex-col mb-10 bg-black">
              <span className="text-7xl font-display font-bold neon-text-blue">{score}</span>
              <span className="text-2xl text-gray-400 mt-2">out of {activeQuizQuestions.length}</span>
            </div>
            <h2 className={`text-4xl font-bold mb-6 ${isPerfect ? 'neon-text-green' : (isGood ? 'neon-text-yellow' : 'neon-text-red')}`}>
              {isPerfect ? 'MAHJONG MASTER! 雀神!' : (isGood ? 'NOT BAD! 有潛力!' : 'KEEP PRACTICING! 加油!')}
            </h2>
            <p className="text-gray-300 text-2xl mb-12 max-w-xl leading-relaxed">
              {isPerfect ? "You are ready for the family table! Time to start shuffling the tiles." : "Review the rules one more time before we play for real."}
            </p>

            <div className="flex flex-col sm:flex-row gap-6">
              <button onClick={() => { setScreen('learn_tiles'); }} className="text-white px-10 py-5 text-xl font-bold rounded-full border-2 border-gray-500 hover:bg-gray-800 transition-colors">
                REVIEW RULES
              </button>
              <button onClick={() => { setScreen('home'); }} className="text-white px-10 py-5 text-xl font-bold font-display rounded-full neon-box-blue hover:bg-cyan-600 transition-all transform hover:scale-105">
                PLAY AGAIN
              </button>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen selection:bg-pink-500 selection:text-white">
          {screen === 'home' && renderHome()}
          {screen === 'learn_tiles' && renderLearnTiles()}
          {screen === 'learn_setup' && renderLearnSetup()}
          {screen === 'learn_rules' && renderLearnRules()}
          {screen === 'learn_patterns' && renderLearnPatterns()}
          {screen === 'practice_wait' && renderPracticeWait()}
          {screen === 'quiz' && renderQuiz()}
          {screen === 'result' && renderResult()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
